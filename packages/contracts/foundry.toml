[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "../../node_modules"]
test = "test"
script = "script"
allow_paths = ["../../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
verbosity = 2
fs_permissions = [{ access = "read", path = "./" }]
gas_reports = ["AgentIdentityRegistry", "PaymentRouter", "RenewalVault"]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.ci]
fuzz = { runs = 10000 }
verbosity = 4

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
